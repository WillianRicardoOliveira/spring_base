spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:erp_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

api.security.token.secret=segredo-super-seguro-para-testes-com-mais-de-32-caracteres
api.security.token.issuer=erp-api-test
api.security.token.expiration-minutes=120

api.security.refresh-token.expiration-days=7
api.security.refresh-token.cleanup-cron=0 0 * * * *

app.security.swagger-public=false
app.cors.allowed-origins=http://localhost:4200

app.security.login.max-failed-attempts=5
app.security.login.lock-minutes=15

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/test/v2.0
sso.claim.email=preferred_username
sso.audience=api-test
sso.scope=sso.login