# SSO / Microsoft Entra ID (Azure AD)
# O frontend deve enviar o access_token emitido para esta API.
# AZURE_ISSUER_URI deve usar o formato: https://login.microsoftonline.com/{tenant-id}/v2.0
# AZURE_API_AUDIENCE deve bater com o claim aud do access_token.
# AZURE_API_SCOPE deve bater com um valor presente no claim scp, por exemplo: sso.login.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_ISSUER_URI:}
sso.claim.email=${SSO_EMAIL_CLAIM:preferred_username}
sso.audience=${AZURE_API_AUDIENCE:}
sso.scope=${AZURE_API_SCOPE:sso.login}