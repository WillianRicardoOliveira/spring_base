spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DB_URL = jdbc:mysql://localhost/erp
# DB_USERNAME = root
# DB_PASSWORD = 123456
# --spring.profiles.active=dev


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

api.security.token.secret=${JWT_SECRET}

api.security.token.expiration-minutes=${JWT_EXPIRATION_MINUTES}

app.cors.allowed-origins=http://localhost:4200


api.security.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS}

api.security.refresh-token.cleanup-cron=${REFRESH_TOKEN_CLEANUP_CRON}

app.security.swagger-public=false


app.security.login.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS}
app.security.login.lock-minutes=${LOGIN_LOCK_MINUTES}





#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

server.error.include-stacktrace=never



api.security.token.issuer=${JWT_ISSUER}


# SSO / Microsoft Entra ID (Azure AD)
# O frontend deve enviar o access_token emitido para esta API.
# AZURE_ISSUER_URI deve usar o formato: https://login.microsoftonline.com/{tenant-id}/v2.0
# AZURE_API_AUDIENCE deve bater com o claim aud do access_token.
# AZURE_API_SCOPE deve bater com um valor presente no claim scp, por exemplo: sso.login.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_ISSUER_URI:https://login.microsoftonline.com/58cef822-b53b-49c4-9241-87216ef31a4f/v2.0}

sso.claim.email=${SSO_EMAIL_CLAIM:preferred_username}

sso.audience=${AZURE_API_AUDIENCE:e807cbd8-3d3c-4292-a7df-e8f1e94076e6}

sso.scope=${AZURE_API_SCOPE:Employees.Read.All}